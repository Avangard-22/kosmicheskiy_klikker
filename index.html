<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Космический Кликер</title>
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Importmap для Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; touch-action: manipulation; user-select: none; }
    body { margin: 0; padding: 0; overflow: hidden; background: #000; width: 100vw; height: 100vh; font-family: 'Orbitron', sans-serif; }
    #space-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; background: #000; }
    #game-wrapper { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="space-bg-container"></div>
  <div id="game-wrapper">
    <header id="header"><h1 id="gameTitle">☿ Меркурий</h1></header>
    <div id="hud-left">
      <div class="hud-item"><i>💎</i> Кристаллы: <span id="coins-value">0</span></div>
      <div class="hud-item"><i>👊</i> Сила: <span id="clickPower-value">1</span></div>
      <div class="hud-item"><i>⚡</i> Крит: <span id="critChance-value">0.1%</span></div>
      <div class="hud-item"><i>🔥</i> Множ.крита: <span id="critMultiplier-value">x2.0</span></div>
    </div>
    <div id="progressContainer"><div id="progressBar"></div></div>
    <div id="progressText">Прогресс: 0.00000 / 0.38710 а.е. (0%)</div>
    <button id="saveBtn" title="Сохранить игру">💾</button>
    <button id="upgradeClickBtn" class="upgrade-btn btn-unavailable">👊<span class="upgrade-cost">80</span></button>
    <button id="upgradeHelperBtn" class="upgrade-btn btn-unavailable">🤖<span class="upgrade-cost">1500</span></button>
    <button id="upgradeCritChanceBtn" class="upgrade-btn btn-unavailable">🎯<span class="upgrade-cost">500</span></button>
    <button id="upgradeCritMultBtn" class="upgrade-btn btn-unavailable">💥<span class="upgrade-cost">800</span></button>
    <button id="upgradeHelperDmgBtn" class="upgrade-btn btn-unavailable">⚔️<span class="upgrade-cost">1000</span></button>
    <div id="gameArea"></div>
    <div id="levelAnnounce"></div>
    <div id="tooltip" class="tooltip"></div>
    <div id="welcomeScreen">
      <h2>🚀 КОСМИЧЕСКИЙ КЛИКЕР</h2>
      <p>Разрушайте восходящие блоки и собирайте космические Кристаллы!</p>
      <button id="continueBtn" class="btn">Продолжить</button>
      <button id="startBtn" class="btn">Новая игра</button>
      <button id="langBtn-welcome">🇷🇺</button>
    </div>
  </div>

  <!-- Игровая логика (обычные скрипты) -->
  <script src="js/game-logic.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/save-system.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/telegram-integration.js"></script>
  <script src="js/daily-bonus.js"></script>

  <!-- 3D-фон (модуль) -->
  <script type="module">
    import { BackgroundManager } from './js/BackgroundManager.js';
    
    window.bgManager = null;
    
    function initSpaceBackground() {
      const container = document.getElementById('space-bg-container');
      if (!container) return;
      
      try {
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        window.bgManager = new BackgroundManager(container, {
          particleCount: isMobile ? 8000 : 15000,
          speedMult: 1.0,
          cameraBaseZ: 120,
          cameraMinZ: 28,
          fovStart: 70,
          fovMin: 35
        }).init();
        
        window.bgManager.on('progress:updated', (data) => {
          const pt = document.getElementById('progressText');
          if (pt) pt.textContent = `Прогресс: ${data.au} а.е. (${data.percent}%)`;
        });
        
        window.addEventListener('resize', () => window.bgManager?.resize());
        document.addEventListener('visibilitychange', () => {
          document.hidden ? window.bgManager?.pause() : window.bgManager?.resume();
        });
        
        console.log('✅ 3D-фон инициализирован');
      } catch (e) {
        console.error('❌ Ошибка фона:', e);
        // Заглушка, чтобы игра не падала
        window.bgManager = { setProgress: ()=>{}, flyToPlanet: ()=>{}, setPlanet: ()=>{}, pause: ()=>{}, resume: ()=>{}, on: ()=>{} };
      }
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSpaceBackground);
    } else {
      initSpaceBackground();
    }
  </script>
</body>
</html>
