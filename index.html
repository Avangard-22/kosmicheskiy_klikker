<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космический Кликер</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Importmap для Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/"
        }
    }
    </script>
    
    <style>
        /* Принудительные стили для правильного наложения слоев */
        #space-bg-container {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            z-index: 0 !important;
            pointer-events: none !important;
        }
        
        #game-ui {
            position: relative !important;
            z-index: 10 !important;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- 🌌 Контейнер для 3D-фона -->
    <div id="space-bg-container"></div>

    <!-- 🎮 Игровой интерфейс -->
    <header id="header">
        <h1 id="gameTitle">☿ Меркурий</h1>
    </header>

    <div id="hud-left">
        <div class="hud-item"><i>💎</i> Кристаллы: <span id="coins-value">0</span></div>
        <div class="hud-item"><i>👊</i> Сила: <span id="clickPower-value">1</span></div>
        <div class="hud-item"><i>⚡</i> Крит: <span id="critChance-value">0.1%</span></div>
        <div class="hud-item"><i>🔥</i> Множ.крита: <span id="critMultiplier-value">x2.0</span></div>
    </div>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    <div id="progressText">Прогресс: 0.00000 / 0.38710 а.е. (0%)</div>

    <button id="saveBtn" title="Сохранить игру">💾</button>

    <!-- 🔽 Кнопки улучшений -->
    <button id="upgradeClickBtn" class="upgrade-btn btn-unavailable">
        👊 <span class="upgrade-cost">80</span>
    </button>
    <button id="upgradeHelperBtn" class="upgrade-btn btn-unavailable">
        🤖 <span class="upgrade-cost">1500</span>
    </button>
    <button id="upgradeCritChanceBtn" class="upgrade-btn btn-unavailable">
        🎯 <span class="upgrade-cost">500</span>
    </button>
    <button id="upgradeCritMultBtn" class="upgrade-btn btn-unavailable">
        💥 <span class="upgrade-cost">800</span>
    </button>
    <button id="upgradeHelperDmgBtn" class="upgrade-btn btn-unavailable">
        ⚔️ <span class="upgrade-cost">1000</span>
    </button>

    <!-- 🛒 Магазин и Достижения -->
    <div id="shop-container" class="shop-container">
        <button id="shopBtn" class="shop-btn">🛒</button>
    </div>
    
    <div id="achievements-container" class="achievements-container">
        <button id="achievementsBtn" class="achievements-btn">🏆</button>
    </div>

    <!-- 🕹️ Игровая зона -->
    <div id="gameArea"></div>

    <!-- 📢 Уведомления -->
    <div id="levelAnnounce"></div>
    <div id="penaltyAnnounce" style="display:none;"></div>
    <div id="tooltip" class="tooltip"></div>

    <!-- 🔊 Звуки -->
    <audio id="clickSound" src="audio/click.mp3" preload="auto"></audio>
    <audio id="breakSound" src="audio/break.mp3" preload="auto"></audio>
    <audio id="comboSound" src="audio/combo.mp3" preload="auto"></audio>
    <audio id="helperSound" src="audio/helper.mp3" preload="auto"></audio>
    <audio id="upgradeSound" src="audio/upgrade.mp3" preload="auto"></audio>
    <audio id="penaltySound" src="audio/penalty.mp3" preload="auto"></audio>

    <!-- 📦 Подключение скриптов игры -->
    <script src="js/save-system.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/telegram-integration.js"></script>
    <script src="js/game-logic.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/daily-bonus.js"></script>

    <!-- 🌌 Инициализация 3D-фона -->
    <script type="module">
        import { ParticlesSwarm } from './js/Sun_System.js';
        window.bgManager = null;
        function initBackground() {
            const container = document.getElementById('space-bg-container');
            if (!container) return;
            try {
                const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
                const swarm = new ParticlesSwarm(container, isMobile ? 8000 : 15000);
                window.bgManager = { swarm, setProgress: (p)=>swarm.speedMult=0.5+(p/100)*3, flyToPlanet:()=>{}, setPlanet:()=>{}, pause: ()=>{if(swarm)swarm.speedMult=0}, resume: ()=>{if(swarm)swarm.speedMult=1.0}, resize: ()=>{} };
                window.addEventListener('resize', () => window.bgManager?.resize());
                console.log('✅ Фон готов');
            } catch (e) { console.error(e); }
        }
        document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', initBackground) : initBackground();
    </script>
    
    <!-- Проверка доступности кнопок -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ids = ['upgradeClickBtn', 'upgradeHelperBtn', 'upgradeCritChanceBtn', 'upgradeCritMultBtn', 'upgradeHelperDmgBtn'];
            let missing = 0;
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    console.log('✅ Кнопка найдена:', id);
                    el.onclick = () => { console.log('🔘 Клик по:', id); };
                } else {
                    console.warn('❌ Кнопка НЕ найдена:', id);
                    missing++;
                }
            });
            if (missing > 0) alert(`❗Не найдено ${missing} кнопок! Проверьте ID в HTML.`);
        });
    </script>
</body>
</html>
</html>
